name: Build executable

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight UTC
  workflow_dispatch: # Keeps manual trigger active

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # CRUCIAL: Changed from 'read' to 'write' so it can create releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to cleanly fetch history for syncing

      - name: Sync Upstream Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote add upstream https://github.com
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit || echo "No new changes or merge conflict"
          git push origin main

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-panel/pnpm-lock.yaml

      - name: Build unsigned executable
        shell: pwsh
        run: ./build.ps1 -Configuration Release

      - name: Upload unsigned executable
        uses: actions/upload-artifact@v4
        with:
          name: WandEnhancer-unsigned
          path: WandEnhancer/bin/Release/WandEnhancer.exe
          if-no-files-found: error

      # ==========================================
      # AUTOMATIC PUBLIC RELEASE
      # ==========================================
      - name: Generate Unique Release Tag
        id: tag
        run: |
          echo "TAG_NAME=v$(date +'%Y.%m.%d-%H%M')" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create Public GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: "Automated Build - ${{ steps.tag.outputs.TAG_NAME }}"
          body: |
            This is an automated build tracking the latest upstream updates.
          draft: false
          prerelease: false
          files: |
            WandEnhancer/bin/Release/WandEnhancer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
